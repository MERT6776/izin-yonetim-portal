<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzin Yönetim Portalı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        /* GÖRSEL ARKA PLAN (VİDEO YERİNE GARANTİ ÇÖZÜM) */
        .bg-img {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.5); /* Şık bir karartma */
            z-index: -1;
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { 
            background: rgba(255, 255, 255, 0.9); padding: 2.5rem; border-radius: 20px;
            width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #0f766e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-img"></div>

    <div class="container">
        <div class="card">
            <h2>Giriş Yap</h2>
            <input type="text" id="user" placeholder="Kullanıcı Adı">
            <input type="password" id="pass" placeholder="Şifre">
            <button onclick="check()">Giriş Yap</button>
        </div>
    </div>

    <script>
        function check() {
            if(document.getElementById('user').value == 'burhan671819' && document.getElementById('pass').value == '181920') {
                alert('Giriş Başarılı!');
            } else {
                alert('Hatalı giriş!');
            }
        }
    </script>
</body>
</html>

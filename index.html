<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzin Yönetim</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow: hidden; }
        .card { background: #1e293b; padding: 40px; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #334155; border: 1px solid #475569; border-radius: 12px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0ea5e9; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        #portal-div { display: none; }
        
        /* KAÇAN BUTONUN YENİ HALİ */
        #itiraz-btn { 
            position: fixed; /* Ekranın her yerinde gezebilir */
            z-index: 999;
            padding: 15px 30px;
            background: #ef4444;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            touch-action: none; /* Mobilde dokunmayı engellemek için */
        }
    </style>
</head>
<body>

    <div id="login-div" class="card">
        <h2>Giriş Yap</h2>
        <input type="text" id="u" placeholder="Kullanıcı Adı">
        <input type="password" id="p" placeholder="Şifre">
        <button onclick="giris()">Giriş Yap</button>
    </div>

    <div id="portal-div" class="card">
        <h2 style="color: #94a3b8;">Kalan İzin</h2>
        <div style="font-size: 50px; font-weight: 800; color: #38bdf8; margin: 20px 0;">27.5 GÜN</div>
        
        <!-- Buton buraya yerleşiyor -->
        <button id="itiraz-btn" onmouseover="kac(this)" ontouchstart="kac(this)">İtiraz Et</button>
        
        <button style="background:#334155; margin-top:80px;" onclick="location.reload()">Çıkış Yap</button>
    </div>

    <script>
        function giris() {
            if(document.getElementById('u').value.trim().toLowerCase() === 'burhan' && 
               document.getElementById('p').value.trim() === '181920') {
                document.getElementById('login-div').style.display = 'none';
                document.getElementById('portal-div').style.display = 'block';
            } else { alert('Hatalı!'); }
        }

        function kac(btn) {
            // Butonu ekranın rastgele bir noktasına ışınla
            var x = Math.random() * (window.innerWidth - 120);
            var y = Math.random() * (window.innerHeight - 60);
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }
    </script>
</body>
</html>

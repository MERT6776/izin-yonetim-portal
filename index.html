<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzin Yönetim</title>
    <style>
        :root {
            --primary: #0f766e;
            --accent: #c60c30;
            --glass: rgba(255, 255, 255, 0.95);
        }
        body { 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background: linear-gradient(135deg, #0f766e, #06b6d4);
            font-family: 'Segoe UI', sans-serif;
        }
        .card { 
            background: var(--glass); padding: 40px; border-radius: 25px; 
            width: 90%; max-width: 350px; text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { color: #333; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }
        button { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-size: 16px; 
            font-weight: 600; transition: transform 0.2s, background 0.3s;
        }
        button:active { transform: scale(0.98); }
        .logout-btn { background: var(--accent); margin-top: 15px; }
        #portal-div { display: none; }
        .izin-badge { font-size: 50px; font-weight: 800; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

    <div id="login-div" class="card">
        <h2>Giriş Yap</h2>
        <input type="text" id="u" placeholder="Kullanıcı Adı">
        <input type="password" id="p" placeholder="Şifre">
        <button onclick="giris()">Giriş Yap</button>
    </div>

    <div id="portal-div" class="card">
        <h2 style="font-size: 1.2rem;">Hoşgeldin, Burhan</h2>
        <p style="color: #666;">Kalan İzin Hakkın</p>
        <div class="izin-badge">27.5</div>
        <p>GÜN</p>
        <button onclick="window.location.href='https://wa.me/905459157444'">💬 WhatsApp İtiraz</button>
        <button class="logout-btn" onclick="cikis()">Çıkış Yap</button>
    </div>

    <script>
        function giris() {
            var u = document.getElementById('u').value.trim().toLowerCase();
            var p = document.getElementById('p').value.trim();
            if(u === 'burhan' && p === '181920') {
                document.getElementById('login-div').style.display = 'none';
                document.getElementById('portal-div').style.display = 'block';
            } else { alert('Hatalı giriş!'); }
        }
        function cikis() {
            document.getElementById('portal-div').style.display = 'none';
            document.getElementById('login-div').style.display = 'block';
        }
    </script>
</body>
</html>

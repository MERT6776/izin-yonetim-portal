<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Hata Veriyor</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow: hidden; }
        .card { background: #1e293b; padding: 40px; border-radius: 30px; width: 300px; text-align: center; position: relative; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }
        .btn-grup { position: relative; height: 100px; margin-top: 20px; }
        .hareketli { position: absolute; padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.1s; }
        #evet { background: #22c55e; color: white; left: 0; }
        #hayir { background: #ef4444; color: white; right: 0; }
        #portal-div { display: none; }
    </style>
</head>
<body>

    <div id="login-div" class="card">
        <h2>Sistem Girişi</h2>
        <input type="text" id="u" placeholder="Kullanıcı Adı">
        <input type="password" id="p" placeholder="Şifre">
        <button onclick="giris()" style="width:100%; padding:10px; margin-top:10px;">Giriş</button>
    </div>

    <div id="portal-div" class="card">
        <h2 style="color: #ef4444;">BORÇ UYARISI</h2>
        <div style="font-size: 30px; margin: 10px 0;">-4 GÜN</div>
        <p style="font-size: 12px;">Burhan Bey, -4 gün olan borcunuzu faizli ödememek için onay verin.</p>
        
        <div class="btn-grup" id="container">
            <button class="hareketli" id="evet" onmouseover="kac()">ÖDEME YAP</button>
            <button class="hareketli" id="hayir" onmouseover="kac()">ÖDEME YAP</button>
        </div>
    </div>

    <script>
        function giris() {
            if(document.getElementById('u').value.toLowerCase() === 'burhan' && document.getElementById('p').value === '181920') {
                document.getElementById('login-div').style.display = 'none';
                document.getElementById('portal-div').style.display = 'block';
            } else { alert('Hatalı!'); }
        }

        function kac() {
            const btns = document.querySelectorAll('.hareketli');
            btns.forEach(btn => {
                const x = Math.random() * 200 - 100;
                const y = Math.random() * 200 - 100;
                btn.style.transform = `translate(${x}px, ${y}px)`;
            });
        }
    </script>
</body>
</html>

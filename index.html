<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İzin Yönetim</title>
    <style>
        body { margin: 0; background: #0f766e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #0f766e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #login-div { display: block; }
        #portal-div { display: none; }
    </style>
</head>
<body>

    <div id="login-div" class="card">
        <h2>Giriş</h2>
        <input type="text" id="u" placeholder="Kullanıcı">
        <input type="password" id="p" placeholder="Şifre">
        <button onclick="giris()">Giriş Yap</button>
    </div>

    <div id="portal-div" class="card">
        <h2>Hoşgeldin Burhan</h2>
        <h1 style="color:#0f766e;">27.5 GÜN</h1>
        <button onclick="window.location.href='https://wa.me/905459157444'">WhatsApp İtiraz</button>
    </div>

    <script>
        function giris() {
            var u = document.getElementById('u').value.trim();
            var p = document.getElementById('p').value.trim();
            if(u === 'burhan671819' && p === '181920') {
                document.getElementById('login-div').style.display = 'none';
                document.getElementById('portal-div').style.display = 'block';
                console.log("Portal gösterildi");
            } else {
                alert('Yanlış!');
            }
        }
    </script>
</body>
</html>

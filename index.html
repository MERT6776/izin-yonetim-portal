<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İzin Yönetim Portalı</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0f766e; font-family: sans-serif; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #0f766e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Giriş Yap</h2>
        <input type="text" id="user" placeholder="Kullanıcı Adı">
        <input type="password" id="pass" placeholder="Şifre">
        <button onclick="check()">Giriş</button>
    </div>
    <script>
        function check() {
            if(document.getElementById('user').value == 'burhan671819' && document.getElementById('pass').value == '181920') {
                alert('Giriş Başarılı!');
            } else { alert('Hatalı!'); }
        }
    </script>
</body>
</html>

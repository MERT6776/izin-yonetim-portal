<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzin Yönetim Portalı</title>
    <style>
        /* Tam Ekran Türk Bayrağı Arka Plan */
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.6);
            z-index: -1;
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { 
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; 
            width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #c60c30; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="container">
        <div class="card">
            <h2>İzin Portalı</h2>
            <input type="text" id="user" placeholder="Kullanıcı Adı">
            <input type="password" id="pass" placeholder="Şifre">
            <button onclick="check()">Giriş Yap</button>
        </div>
    </div>

    <script>
        function check() {
            var u = document.getElementById('user').value.trim().toLowerCase();
            var p = document.getElementById('pass').value.trim();
            
            if(u === 'burhan671819' && p === '181920') {
                alert('Giriş Başarılı!');
                // Buraya giriş sonrası yönlendirme ekleyebiliriz
            } else {
                alert('Hatalı kullanıcı adı veya şifre!');
            }
        }
    </script>
</body>
</html>
